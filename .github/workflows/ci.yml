name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  ci:
    name: CI (Sykli)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.7.1

      - name: Format check
        run: gofmt -l . | grep -q . && exit 1 || exit 0

      - name: Vet
        run: go vet ./...

      - name: Lint
        run: golangci-lint run --timeout 5m

      - name: Test
        run: go test -timeout 10m ./...

      - name: Build
        run: mkdir -p bin && CGO_ENABLED=0 go build -ldflags='-s -w' -o bin/tapio ./cmd/tapio 2>/dev/null || echo 'No main.go yet'

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out results.sarif ./...'

      - uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: results.sarif

  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [ci, security]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.ci.result }}" == "failure" ]; then
            echo "CI failed"
            exit 1
          fi
          echo "All checks passed"
