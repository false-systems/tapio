name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  ci:
    name: CI (Sykli)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install tools
        run: |
          # Install sykli
          curl -fsSL https://raw.githubusercontent.com/yairfalse/sykli/main/install.sh | bash
          # Install golangci-lint
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.7.1

      - name: Run sykli
        run: ~/.local/bin/sykli

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out results.sarif ./...'

      - uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: results.sarif

  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [ci, security]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.ci.result }}" == "failure" ]; then
            echo "CI failed"
            exit 1
          fi
          echo "All checks passed"
