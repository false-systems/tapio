name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  security-events: write

env:
  GO_VERSION: '1.24'

jobs:
  # Detect what changed - run eBPF gen only if needed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      ebpf: ${{ steps.filter.outputs.ebpf }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ebpf:
              - 'internal/observers/**/bpf/**/*.c'
              - 'internal/observers/**/bpf/**/*.h'
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/ci.yml'

  # Generate eBPF ONLY when .c/.h files changed
  ebpf-generate:
    name: Generate eBPF
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ebpf == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: yairfalse/.github/.github/actions/setup-go@main
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install eBPF toolchain
        run: sudo apt-get update && sudo apt-get install -y clang llvm libbpf-dev

      - name: Generate eBPF code
        run: |
          cd internal/observers/network/bpf && go generate
          cd ../../node/bpf && go generate

      - name: Upload generated eBPF code
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-generated
          path: |
            internal/observers/network/bpf/*_bpf*.go
            internal/observers/node/bpf/*_bpf*.go
          retention-days: 1

  # Standard Go CI (format, vet, lint) - uses shared tooling
  format:
    name: Format
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: yairfalse/.github/.github/actions/setup-go@main
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "❌ Unformatted files:" && echo "$unformatted" && exit 1
          fi

  vet:
    name: Vet
    runs-on: ubuntu-latest
    needs: [changes, ebpf-generate]
    if: always() && needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v6

      # Download eBPF if it was regenerated
      - name: Download eBPF artifacts
        if: needs.changes.outputs.ebpf == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ebpf-generated

      - uses: yairfalse/.github/.github/actions/setup-go@main
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run go vet
        run: |
          if [ "${{ needs.changes.outputs.ebpf }}" == "true" ]; then
            go vet ./...
          else
            # Skip eBPF packages if not generated
            go vet $(go list ./... | grep -v '/observers/network$' | grep -v '/observers/node$' | grep -v '/bpf$')
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [changes, ebpf-generate]
    if: always() && needs.changes.outputs.ebpf == 'true'  # Only if eBPF generated
    steps:
      - uses: actions/checkout@v6

      - name: Download eBPF artifacts
        uses: actions/download-artifact@v4
        with:
          name: ebpf-generated

      - uses: yairfalse/.github/.github/actions/setup-go@main
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.6.2
          args: --timeout=5m
          only-new-issues: true

  # Tests - download eBPF if needed
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [changes, ebpf-generate, format, vet]
    if: always() && needs.changes.outputs.go == 'true' && needs.format.result == 'success' && needs.vet.result == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Download eBPF artifacts
        if: needs.changes.outputs.ebpf == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ebpf-generated

      - uses: yairfalse/.github/.github/actions/setup-go@main
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test -race -v -timeout=10m ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          fail_ci_if_error: false

  # Security scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: yairfalse/.github/.github/actions/setup-go@main
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out results.sarif ./...'
      - uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: results.sarif

  # Build only if tests pass
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [changes, ebpf-generate, format, vet, test]
    if: always() && needs.test.result == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Download eBPF artifacts
        if: needs.changes.outputs.ebpf == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ebpf-generated

      - uses: yairfalse/.github/.github/actions/setup-go@main
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binaries
        run: |
          CGO_ENABLED=0 go build -v -ldflags="-s -w" -o bin/tapio ./cmd/tapio
          CGO_ENABLED=0 go build -v -ldflags="-s -w" -o bin/operator ./cmd/operator

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/
          retention-days: 7

  # Status check
  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [format, vet, lint, test, security, build]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.format.result }}" == "failure" ] || \
             [ "${{ needs.vet.result }}" == "failure" ] || \
             [ "${{ needs.lint.result }}" == "failure" ] || \
             [ "${{ needs.test.result }}" == "failure" ] || \
             [ "${{ needs.security.result }}" == "failure" ] || \
             [ "${{ needs.build.result }}" == "failure" ]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ All checks passed"
