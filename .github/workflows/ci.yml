name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

env:
  GO_VERSION: '1.24'

jobs:
  # ============================================================================
  # DETECT CHANGES - Only check what matters
  # ============================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      ebpf: ${{ steps.filter.outputs.ebpf }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ebpf:
              - 'internal/observers/**/bpf/**/*.c'
              - 'internal/observers/**/bpf/**/*.h'

  # ============================================================================
  # GENERATE EBPF - Only if eBPF code changed
  # ============================================================================
  ebpf:
    name: Generate eBPF
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ebpf == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install eBPF toolchain
        run: sudo apt-get update && sudo apt-get install -y clang llvm libbpf-dev

      - name: Generate eBPF code
        run: |
          cd internal/observers/network/bpf && go generate
          cd ../../node/bpf && go generate

      - name: Upload generated code
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-generated
          path: |
            internal/observers/network/bpf/*_bpf*.go
            internal/observers/node/bpf/*_bpf*.go

  # ============================================================================
  # QUICK CHECKS - Fail fast, run in parallel
  # ============================================================================
  quick-checks:
    name: Quick Checks
    runs-on: ubuntu-latest
    needs: [changes, ebpf]
    if: always()

    steps:
      - uses: actions/checkout@v6

      - name: Download eBPF (if regenerated)
        if: needs.changes.outputs.ebpf == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ebpf-generated

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Format check (instant fail if unformatted)
      - name: Format
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "❌ Unformatted files:"
            gofmt -l .
            exit 1
          fi

      # Go vet (catches obvious bugs)
      # Skip eBPF packages if not generated
      - name: Vet
        run: |
          if [ "${{ needs.changes.outputs.ebpf }}" == "true" ]; then
            go vet ./...
          else
            go vet $(go list ./... | grep -v '/observers/network$' | grep -v '/observers/node$' | grep -v '/bpf$')
          fi

      # golangci-lint (comprehensive linting)
      # Skip entirely if eBPF not generated (typecheck will fail)
      - name: Lint
        if: needs.changes.outputs.ebpf == 'true'
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m
          only-new-issues: true

  # ============================================================================
  # TESTS - The meat of CI
  # ============================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [changes, ebpf, quick-checks]
    if: always() && needs.quick-checks.result == 'success'

    steps:
      - uses: actions/checkout@v6

      - name: Download eBPF (if regenerated)
        if: needs.changes.outputs.ebpf == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ebpf-generated

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Run tests with race detector and coverage
      # Skip eBPF packages if not generated
      - name: Test
        run: |
          if [ "${{ needs.changes.outputs.ebpf }}" == "true" ]; then
            go test -v -race -timeout=2m -coverprofile=coverage.txt -covermode=atomic ./...
          else
            go test -v -race -timeout=2m -coverprofile=coverage.txt -covermode=atomic $(go list ./... | grep -v '/observers/network$' | grep -v '/observers/node$' | grep -v '/bpf$')
          fi

      # Enforce 80% coverage per package (hard fail)
      - name: Coverage Check
        run: |
          echo "📊 Checking per-package coverage..."

          # Get coverage per package, excluding packages with 0% (no tests)
          FAILED=0
          while IFS= read -r line; do
            PKG=$(echo "$line" | awk '{print $1}')
            COV=$(echo "$line" | awk '{print $2}' | sed 's/%//')

            # Skip total line and packages with 0% coverage (no tests)
            if [[ "$PKG" == "total:" ]] || [[ "$COV" == "0.0" ]]; then
              continue
            fi

            echo "  $PKG: ${COV}%"

            # Check if coverage is below 80%
            if (( $(echo "$COV < 80" | bc -l) )); then
              echo "  ❌ $PKG below 80% (got ${COV}%)"
              FAILED=1
            fi
          done < <(go tool cover -func=coverage.txt | grep -E "^github.com")

          # Also show total for reference
          TOTAL=$(go tool cover -func=coverage.txt | grep total | awk '{print $3}')
          echo ""
          echo "📊 Total coverage: $TOTAL (for reference)"

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "❌ One or more packages below 80% coverage"
            exit 1
          fi

          echo "✅ All packages meet 80% coverage requirement"

      # Upload to codecov (optional, non-blocking)
      - name: Upload Coverage
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          file: ./coverage.txt

  # ============================================================================
  # BUILD - Verify everything compiles
  # ============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [changes, ebpf, test]
    if: always() && needs.test.result == 'success'

    steps:
      - uses: actions/checkout@v6

      - name: Download eBPF (if regenerated)
        if: needs.changes.outputs.ebpf == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ebpf-generated

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Build all packages
      # Skip eBPF packages if not generated
      - name: Build
        run: |
          if [ "${{ needs.changes.outputs.ebpf }}" == "true" ]; then
            go build -v ./...
          else
            go build -v $(go list ./... | grep -v '/observers/network$' | grep -v '/observers/node$' | grep -v '/bpf$')
          fi
