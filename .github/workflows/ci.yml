name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: '1.24'

jobs:
  # ============================================================================
  # QUICK CHECKS - Fail fast, run in parallel
  # ============================================================================
  quick-checks:
    name: Quick Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Format check (instant fail if unformatted)
      - name: Format
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "❌ Unformatted files:"
            gofmt -l .
            exit 1
          fi

      # Go vet (catches obvious bugs)
      - name: Vet
        run: go vet ./...

      # golangci-lint (comprehensive linting)
      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m
          only-new-issues: true

      # CLAUDE.md compliance
      - name: CLAUDE.md Check
        run: |
          if [ -x ./scripts/verify-claude-md.sh ]; then
            ./scripts/verify-claude-md.sh
          fi

  # ============================================================================
  # TESTS - The meat of CI
  # ============================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: quick-checks

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Run tests with race detector and coverage
      - name: Test
        run: |
          go test -v -race -timeout=2m -coverprofile=coverage.txt -covermode=atomic ./...

      # Enforce 80% coverage (hard fail)
      - name: Coverage Check
        run: |
          COVERAGE=$(go tool cover -func=coverage.txt | grep total | awk '{print $3}' | sed 's/%//')
          echo "📊 Coverage: ${COVERAGE}%"

          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Coverage below 80% (got ${COVERAGE}%)"
            exit 1
          fi

      # Upload to codecov (optional, non-blocking)
      - name: Upload Coverage
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: ./coverage.txt

  # ============================================================================
  # BUILD - Verify everything compiles
  # ============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Build all packages
      - name: Build
        run: go build -v ./...

      # Optional: Build binaries when cmd/ exists
      # - name: Build Binaries
      #   run: |
      #     mkdir -p bin/
      #     CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/tapio ./cmd/tapio
