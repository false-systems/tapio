---
apiVersion: v1
kind: Namespace
metadata:
  name: tapio
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: tapio
data:
  config.alloy: |
    // OTLP receiver for Tapio events
    otelcol.receiver.otlp "tapio" {
      http {
        endpoint = "0.0.0.0:4318"
      }

      output {
        logs    = [otelcol.processor.batch.default.input]
        metrics = [otelcol.processor.batch.default.input]
        traces  = [otelcol.processor.batch.default.input]
      }
    }

    // Batch processor
    otelcol.processor.batch "default" {
      output {
        logs    = [otelcol.exporter.loki.default.input]
        metrics = [otelcol.exporter.prometheus.default.input]
      }
    }

    // Export logs to Loki
    otelcol.exporter.loki "default" {
      endpoint = "http://loki:3100/loki/api/v1/push"
    }

    // Export metrics to Prometheus
    otelcol.exporter.prometheus "default" {
      endpoint = "http://prometheus:9090/api/v1/write"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: tapio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      containers:
      - name: alloy
        image: grafana/alloy:latest
        args:
        - run
        - /etc/alloy/config.alloy
        - --server.http.listen-addr=0.0.0.0:12345
        ports:
        - containerPort: 4318
          name: otlp-http
        - containerPort: 12345
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/alloy
      volumes:
      - name: config
        configMap:
          name: alloy-config
---
apiVersion: v1
kind: Service
metadata:
  name: alloy
  namespace: tapio
spec:
  selector:
    app: alloy
  ports:
  - name: otlp-http
    port: 4318
    targetPort: 4318
  - name: http
    port: 12345
    targetPort: 12345
---
# Loki for log storage
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: tapio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
      - name: loki
        image: grafana/loki:latest
        args:
        - -config.file=/etc/loki/local-config.yaml
        ports:
        - containerPort: 3100
          name: http
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: tapio
spec:
  selector:
    app: loki
  ports:
  - name: http
    port: 3100
    targetPort: 3100
---
# Grafana for visualization
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: tapio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "true"
        - name: GF_AUTH_ANONYMOUS_ORG_ROLE
          value: "Admin"
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: tapio
spec:
  selector:
    app: grafana
  ports:
  - name: http
    port: 3000
    targetPort: 3000
