---
# Network Observer DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tapio-network-observer
  namespace: tapio
  labels:
    app: tapio
    component: network-observer
spec:
  selector:
    matchLabels:
      app: tapio
      component: network-observer
  template:
    metadata:
      labels:
        app: tapio
        component: network-observer
    spec:
      hostNetwork: true
      hostPID: true
      serviceAccountName: tapio-observer
      tolerations:
      - operator: Exists  # Run on all nodes including control plane
      containers:
      - name: network-observer
        image: tapio/observers:latest  # Replace with your image
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true  # Required for eBPF
          capabilities:
            add:
            - SYS_ADMIN
            - SYS_RESOURCE
            - NET_ADMIN
        env:
        # Simple Mode: OTLP emitter only
        - name: TAPIO_EMITTER
          value: "otlp"
        - name: TAPIO_OTLP_ENDPOINT
          value: "alloy.tapio.svc.cluster.local:4318"
        - name: TAPIO_OTLP_INSECURE
          value: "true"
        # Sampling (optional - default 100%)
        - name: TAPIO_SAMPLING_RATE
          value: "1.0"
        # Observer name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: sys
          mountPath: /sys
          readOnly: true
        - name: debugfs
          mountPath: /sys/kernel/debug
      volumes:
      - name: sys
        hostPath:
          path: /sys
      - name: debugfs
        hostPath:
          path: /sys/kernel/debug
---
# Scheduling Observer Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tapio-scheduling-observer
  namespace: tapio
  labels:
    app: tapio
    component: scheduling-observer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tapio
      component: scheduling-observer
  template:
    metadata:
      labels:
        app: tapio
        component: scheduling-observer
    spec:
      serviceAccountName: tapio-observer
      containers:
      - name: scheduling-observer
        image: tapio/observers:latest  # Replace with your image
        imagePullPolicy: IfNotPresent
        env:
        # Simple Mode: OTLP emitter only
        - name: TAPIO_EMITTER
          value: "otlp"
        - name: TAPIO_OTLP_ENDPOINT
          value: "alloy.tapio.svc.cluster.local:4318"
        - name: TAPIO_OTLP_INSECURE
          value: "true"
        # Sampling (optional - default 100%)
        - name: TAPIO_SAMPLING_RATE
          value: "1.0"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
# ServiceAccount for observers
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tapio-observer
  namespace: tapio
---
# ClusterRole for K8s API access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tapio-observer
rules:
- apiGroups: [""]
  resources:
  - pods
  - services
  - nodes
  - events
  verbs:
  - get
  - list
  - watch
- apiGroups: ["apps"]
  resources:
  - deployments
  - replicasets
  - daemonsets
  - statefulsets
  verbs:
  - get
  - list
  - watch
---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tapio-observer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tapio-observer
subjects:
- kind: ServiceAccount
  name: tapio-observer
  namespace: tapio
